name: Update tiez-clipboard manifest

on:
  workflow_dispatch:
  schedule:
    - cron: '57 2 * * *'

permissions:
  contents: write

jobs:
  update-tiez-clipboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout bucket
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update manifest from latest Windows release
        id: update
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'

          $manifestPath = 'bucket/tiez-clipboard.json'
          $repo = 'jimuzhe/tiez-clipboard'

          # 核心流程：读取 release 列表，只选择 Windows 使用的 v数字 tag，跳过 mac-v* release。
          $headers = @{
            Accept = 'application/vnd.github+json'
            'X-GitHub-Api-Version' = '2022-11-28'
          }
          if ($env:GITHUB_TOKEN) {
            $headers.Authorization = "Bearer $env:GITHUB_TOKEN"
          }

          $releases = Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases?per_page=30" -Headers $headers
          $release = $releases |
            Where-Object { -not $_.draft -and -not $_.prerelease -and $_.tag_name -match '^v\d+(\.\d+)*$' } |
            Select-Object -First 1
          if (-not $release) {
            throw "No stable Windows release with tag pattern 'v<version>' was found."
          }

          $version = $release.tag_name -replace '^v', ''
          $assetName = "TieZ_$version-portable.zip"
          $asset = $release.assets | Where-Object { $_.name -eq $assetName } | Select-Object -First 1
          if (-not $asset) {
            throw "Release '$($release.tag_name)' does not contain asset '$assetName'."
          }

          $url = $asset.browser_download_url
          $hash = $null

          if ($asset.digest -and $asset.digest -match '^sha256:(.+)$') {
            $hash = $Matches[1].ToLowerInvariant()
          } else {
            # 兜底：没有可用 digest 时下载便携包并本地计算 SHA256。
            $downloadPath = Join-Path $env:RUNNER_TEMP $assetName
            Invoke-WebRequest -Uri $url -OutFile $downloadPath
            $hash = (Get-FileHash -Algorithm SHA256 -Path $downloadPath).Hash.ToLowerInvariant()
          }

          $manifest = Get-Content $manifestPath -Raw | ConvertFrom-Json
          $oldJson = $manifest | ConvertTo-Json -Depth 20

          $manifest.version = $version
          $manifest.architecture.'64bit'.url = $url
          $manifest.architecture.'64bit'.hash = $hash

          $newJson = $manifest | ConvertTo-Json -Depth 20
          if ($newJson -ne $oldJson) {
            Set-Content -Path $manifestPath -Value ($newJson + "`n") -Encoding utf8
            "changed=true" >> $env:GITHUB_OUTPUT
            "version=$version" >> $env:GITHUB_OUTPUT
          } else {
            "changed=false" >> $env:GITHUB_OUTPUT
            "version=$version" >> $env:GITHUB_OUTPUT
          }

      - name: Commit updated manifest
        if: steps.update.outputs.changed == 'true'
        shell: pwsh
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add bucket/tiez-clipboard.json
          git commit -m "tiez-clipboard: Update to version ${{ steps.update.outputs.version }}"
          git push
